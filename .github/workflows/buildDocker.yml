name: SonarQube Docker
on:
  push:
    branches:
      - main
    paths:
      - '**/Dockerfile'
      - 'docker-compose*.yml'
      - '.dockerignore'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/Dockerfile'
      - 'docker-compose*.yml'
      - '.dockerignore'
  workflow_dispatch:
jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=tablesoccer-docker
            -Dsonar.projectName=TableSoccerRanker-Docker
            -Dsonar.sources=backend/Dockerfile,frontend/Dockerfile,docker-compose.yml
